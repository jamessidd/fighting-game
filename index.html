<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      box-sizing: border-box;
      font-family: "Press Start 2P", cursive;
    }

    /* ---- Title screen ---- */
    #titleScreen {
      position: absolute;
      inset: 0;
      z-index: 11;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: rgba(10, 8, 20, 0.7);
      color: white;
    }
    #titleName {
      font-size: 46px;
      letter-spacing: 3px;
      text-shadow: 4px 4px 0 #000, 0 0 18px #a78bfa;
      color: #facc15;
      text-align: center;
      line-height: 1.2;
    }
    #titleSub {
      font-size: 12px;
      opacity: 0.85;
      text-shadow: 2px 2px 0 #000;
    }
    #titleButtons { display: flex; gap: 16px; }
    #titleHint {
      font-size: 10px;
      opacity: 0.8;
      animation: blink 1.1s steps(2, start) infinite;
    }
    @keyframes blink { 50% { opacity: 0.15; } }

    /* ---- Character select screen ---- */
    #characterSelect {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none; /* toggled to flex by JS */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(10, 8, 20, 0.82);
      color: white;
      padding: 24px;
    }
    #csPrompt {
      font-size: 18px;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 1px;
    }
    #csGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .cs-card {
      position: relative;
      width: 150px;
      height: 150px;
      background: rgba(255, 255, 255, 0.06);
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.08s, border-color 0.08s;
    }
    .cs-card:hover {
      transform: translateY(-3px);
      border-color: #fff;
    }
    .cs-card canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .cs-name {
      position: relative;
      z-index: 2;
      font-size: 9px;
      text-align: center;
      padding: 6px 4px;
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
    }
    .cs-badge {
      position: absolute;
      top: 6px;
      z-index: 3;
      font-size: 9px;
      padding: 3px 5px;
      border-radius: 4px;
      color: #000;
      font-weight: bold;
    }
    .cs-badge.p1 { left: 6px; background: #38bdf8; }
    .cs-badge.p2 { right: 6px; background: #f87171; }
    .cs-card.sel-p1 { border-color: #38bdf8; }
    .cs-card.sel-p2 { border-color: #f87171; }
    .cs-card.sel-both {
      border-color: #a78bfa;
    }
    #csButtons { display: flex; gap: 16px; align-items: center; }
    .cs-btn {
      font-family: inherit;
      font-size: 12px;
      color: #000;
      background: #facc15;
      border: 3px solid #fff;
      border-radius: 6px;
      padding: 12px 20px;
      cursor: pointer;
    }
    .cs-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .cs-btn.secondary { background: #cbd5e1; }
    #csHint { font-size: 9px; opacity: 0.8; }

    /* ---- In-game controls display ---- */
    .game-controls {
      position: absolute;
      bottom: 10px;
      z-index: 4;
      display: none; /* toggled on during a match */
      color: rgba(255, 255, 255, 0.9);
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 8px;
      line-height: 1.8;
      pointer-events: none;
    }
    #p1Controls { left: 10px; }
    #p2Controls { right: 10px; text-align: right; }
    .ctrl-title {
      font-size: 9px;
      margin-bottom: 4px;
      color: #facc15;
    }
  </style>
</head>

<body>
  <!-- red container div -->
  <div style="position: relative; display: inline-block; margin: auto;">
    <!-- smaller red container div -->
    <div
      style="
        position: absolute;
        display: flex;
        width: 100%;
        align-items: center;
        padding: 20px;
      "
    >
      <!-- player health + stamina -->
      <div style="width: 100%; display: flex; flex-direction: column; gap: 4px;">
        <div
          style="
            position: relative;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            border-top: 4px solid white;
            border-left: 4px solid white;
            border-bottom: 4px solid white;
          "
        >
          <div
            style="
              background-color: rgba(255, 255, 255, 0.1);
              height: 30px;
              width: 100%;
            "
          ></div>
          <div
            id="playerHealth"
            style="
              position: absolute;
              background: #84cc16;
              top: 0;
              right: 0;
              bottom: 0;
              width: 100%;
            "
          ></div>
        </div>
        <!-- player stamina -->
        <div
          style="
            position: relative;
            height: 12px;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.35);
          "
        >
          <div
            id="playerStamina"
            style="
              position: absolute;
              background: #f59e0b;
              top: 0;
              right: 0;
              bottom: 0;
              width: 100%;
            "
          ></div>
        </div>
      </div>

      <!-- timer -->
      <div
        id="timer"
        style="
          background-color: black;
          width: 100px;
          height: 60px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          border: 4px solid white;
        "
      >
      </div>

      <!-- enemy health + stamina -->
      <div style="width: 100%; display: flex; flex-direction: column; gap: 4px;">
        <div
          style="
            position: relative;
            width: 100%;
            border-top: 4px solid white;
            border-right: 4px solid white;
            border-bottom: 4px solid white;
          "
        >
          <div
            style="background-color: rgba(255, 255, 255, 0.1); height: 30px"
          ></div>
          <div
            id="enemyHealth"
            style="
              position: absolute;
              background: #84cc16;
              top: 0;
              right: 0;
              bottom: 0;
              left: 0;
            "
          ></div>
        </div>
        <!-- enemy stamina -->
        <div
          style="
            position: relative;
            height: 12px;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.35);
          "
        >
          <div
            id="enemyStamina"
            style="
              position: absolute;
              background: #f59e0b;
              top: 0;
              left: 0;
              bottom: 0;
              width: 100%;
            "
          ></div>
        </div>
      </div>

      <div></div>
    </div>
    <div
      id="displayText"
      style="
        position: absolute;
        color: white;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 5;
      "
    ></div>
    <div id="characterSelect">
      <div id="csPrompt"></div>
      <div id="csGrid"></div>
      <div id="csButtons">
        <button id="csFight" class="cs-btn" disabled>FIGHT!</button>
        <button id="csReset" class="cs-btn secondary">Reset picks</button>
      </div>
      <div id="csHint">P1: A/D move, W jump, S attack, F special, L-Shift block, E roll &nbsp;|&nbsp; P2: Arrows move, Up jump, Down attack, / special, R-Shift block, . roll</div>
    </div>
    <div id="p1Controls" class="game-controls"></div>
    <div id="p2Controls" class="game-controls"></div>
    <div id="titleScreen">
      <div id="titleName">ELEMENTAL<br />ROYALE</div>
      <div id="titleSub">Local 2-Player Fighting Game</div>
      <div id="titleButtons">
        <button id="startBtn" class="cs-btn">START</button>
        <button id="muteBtn" class="cs-btn secondary">Sound: On</button>
      </div>
      <div id="titleHint">Press Enter to start</div>
    </div>
    <canvas></canvas>
  </div>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"
    integrity="sha512-16esztaSRplJROstbIIdwX3N97V1+pZvV33ABoG1H2OyTttBxEGkTsoIVsiP1iaTtM8b3+hu2kB6pQ4Clr5yug=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  <script type="module"src="js/characters.js"></script>
  <script src="js/utils.js"></script>
  <script type="module"src="js/classes.js"></script>
  <script type="module"src="index.js"></script>
</body>
